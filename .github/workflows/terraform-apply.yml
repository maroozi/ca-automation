name: Terraform Apply - CA Group

on:
  push:
    branches:
      - main
    paths:
      - terraform/ca-group/members.auto.tfvars  # Only triggers when membership changes

permissions:
  contents: read

jobs:
  terraform-apply:
    name: Apply CA Group Membership
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=ca-group.tfstate"
        working-directory: terraform/ca-group

      - name: Terraform Apply
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id:          ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_ca_group_name:      ${{ vars.TF_CA_GROUP_NAME }}
          TF_VAR_ca_group_description: ${{ vars.TF_CA_GROUP_DESCRIPTION }}
        run: terraform apply -auto-approve
        working-directory: terraform/ca-group
